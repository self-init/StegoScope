<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StegoScope</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Menu Bar -->
  <header id="menubar">
    <div class="menubar-left">
      <span class="app-name">StegoScope</span>
      <nav class="menubar-menus">
        <button class="menu-btn" data-menu="file">File</button>
        <button class="menu-btn" data-menu="view">View</button>
        <button class="menu-btn" data-menu="help">Help</button>
      </nav>
    </div>
    <div class="menubar-center">
      <div id="tab-bar"></div>
    </div>
    <div class="menubar-right">
      <span id="image-info"></span>
    </div>
    <!-- Shared dropdown panel (positioned absolutely under triggering button) -->
    <div id="menu-dropdown" class="menu-dropdown hidden"></div>
  </header>

  <!-- Main Layout -->
  <div id="main-layout">

    <!-- Left: History Panel -->
    <aside id="history-panel">
      <div class="panel-header">
        History
        <div class="panel-header-actions">
          <button id="undo-btn" class="panel-icon-btn" title="Undo (Ctrl+Z)" disabled>↩</button>
          <button id="redo-btn" class="panel-icon-btn" title="Redo (Ctrl+Y)" disabled>↪</button>
          <button id="history-panel-close" class="panel-icon-btn" title="Close History">×</button>
        </div>
      </div>
      <div id="history-list">
        <div class="history-empty">No image loaded</div>
      </div>
      <div class="panel-resize-handle panel-resize-right"></div>
    </aside>

    <!-- Center: Grid Area -->
    <main id="grid-area">
      <!-- Drop zone — fills grid, hidden after image loaded -->
      <div id="drop-zone" class="drop-zone-grid">
        <svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="16" width="48" height="36" rx="3" stroke="currentColor" stroke-width="2" fill="none"/>
          <circle cx="22" cy="28" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M8 42 L20 30 L30 40 L40 28 L56 42" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
        </svg>
        <span id="drop-zone-label">Drop image or <label for="file-input" class="file-label">browse</label></span>
        <input type="file" id="file-input" accept="image/*" hidden>
      </div>

      <!-- Zoom controls -->
      <div id="zoom-controls">
        <button id="zoom-out-btn" title="Zoom Out (Ctrl+−)">−</button>
        <span id="zoom-label">100%</span>
        <button id="zoom-in-btn" title="Zoom In (Ctrl+=)">+</button>
      </div>

      <div id="tile-grid" hidden></div>
    </main>

    <!-- Right: Parameter Panel -->
    <aside id="param-panel">
      <div class="panel-resize-handle panel-resize-left"></div>
      <div class="panel-header">
        <span id="param-panel-title">Filter</span>
        <button id="param-panel-close" title="Close (Esc)">×</button>
      </div>
      <div id="param-panel-placeholder">Select a tile to view properties</div>
      <div id="param-panel-body" hidden>
        <div id="param-panel-top">
          <button id="apply-btn"       class="btn-secondary" hidden>Apply</button>
          <button id="promote-btn"     class="btn-primary">Promote</button>
          <button id="export-tile-btn" class="btn-secondary">Export</button>
        </div>
        <div id="preset-bar"></div>
        <div id="param-controls"></div>
      </div>
    </aside>

  </div>

  <!-- Hidden canvas for image processing -->
  <canvas id="work-canvas" hidden></canvas>

  <!-- Large image preview overlay -->
  <div id="preview-overlay" class="preview-overlay hidden" role="dialog" aria-modal="true">
    <div class="preview-header">
      <span id="preview-label"></span>
      <button id="preview-close" title="Close (Esc or Space)">×</button>
    </div>
    <div class="preview-canvas-wrap">
      <canvas id="preview-canvas"></canvas>
    </div>
    <div class="preview-footer">
      <span id="preview-dims"></span>
    </div>
  </div>

  <!-- Keybind bar -->
  <footer id="keybind-bar"></footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
